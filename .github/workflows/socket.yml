name: Socket Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - master
  issue_comment:
    types: [created]
  workflow_dispatch: {}

# Prevent redundant concurrent runs for the same commit
concurrency:
  group: socket-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  socket:
    name: socket/supply-chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for Socket to post PR comments
      issues: write         # Required for Socket to post issue comments
    # Skip Dependabot PRs (Socket handles its own dependency updates)
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' && format('refs/heads/{0}', github.event.repository.default_branch) == github.ref ||
       github.event_name == 'pull_request' ||
       github.event_name == 'issue_comment')
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - name: Get changed files
        id: changed-files
        run: |
          if ${{ github.event_name == 'pull_request' }}; then
            echo "changed_files=$(git diff --name-only -r HEAD^1 HEAD | xargs)" >> $GITHUB_OUTPUT
          else
            echo "changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }} | xargs)" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Get PR State
        if: github.event_name == 'pull_request'
        run: echo "EVENT_ACTION=${{ github.event.action }}" >> $GITHUB_ENV

      - name: Install Socket CLI
        run: pip install socketsecurity --upgrade

      - name: Check if Default Branch
        if: ${{ always() && format('refs/heads/{0}', github.event.repository.default_branch) == github.ref }}
        run: echo "DEFAULT_BRANCH=1" >> $GITHUB_ENV

      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        id: get_pr_data
        with:
          script: |
            let data = (
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                commit_sha: context.sha,
                owner: context.repo.owner,
                repo: context.repo.repo,
              })
            ).data[0];
            if (data === undefined) {
              data = {
                'number': null,
                'title': null
              }
            }
            return data;

      - name: Save Pull Request Number
        run: |
          echo "PR_NUMBER=${{ fromJson(steps.get_pr_data.outputs.result).number || github.event.issue.number || github.event.number }}" >> $GITHUB_ENV

      - name: Run Socket Security Scan
        # Socket scans dependency manifests (package.json, requirements.txt, go.mod, etc.)
        # and alerts on supply chain risks: malware, typosquats, suspicious packages.
        # SOCKET_SECURITY_API_KEY should be set as an org secret scoped to public repos.
        env:
          SOCKET_SECURITY_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          CHANGED_FILES=$(echo "${{ steps.changed-files.outputs.changed_files }}" | tr " " "\n")
          FILES=""
          while IFS= read -r line; do
            FILES="$FILES\"$line\","
          done <<< "$CHANGED_FILES"
          FILES=$(echo $FILES | sed 's/,*$//')
          socketcli \
            --files "[$FILES]" \
            --scm github \
            --repo ${{ github.event.repository.name }} \
            --branch "${{ github.ref_name }}" \
            $(if [ ! -z $DEFAULT_BRANCH ]; then echo "--default_branch"; fi) \
            --pr_number $(if [ -z $PR_NUMBER ]; then echo 0; else echo $PR_NUMBER; fi) \
            --committer "$GITHUB_ACTOR" \
            --commit_message "$COMMIT_MESSAGE" \
            --target_path $GITHUB_WORKSPACE
