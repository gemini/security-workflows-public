name: Semgrep OSS

on:
  pull_request: {}
  workflow_dispatch: {}
  merge_group:
    types: [checks_requested]
  schedule:
    # Full scan of main every Monday at 06:17 UTC.
    # Randomized time to avoid GHA load spikes.
    - cron: '17 6 * * 1'

jobs:
  semgrep:
    name: public
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload to GitHub Code Scanning
      actions: read
    # Skip Dependabot PRs and merge group events (diff scan not useful pre-merge)
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]' &&
      github.event_name != 'merge_group'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep OSS
        # Runs in CI mode: diff-aware on PRs, full scan on push/schedule.
        # No SEMGREP_APP_TOKEN = fully OSS/local mode; no data leaves the runner.
        # SEMGREP_RULES sets the community rulesets to apply.
        run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_RULES: >-
            p/default
            p/security-audit
            p/owasp-top-ten

      - name: Upload findings to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        # Upload even on scan failure so findings are visible in the Security tab
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-oss
